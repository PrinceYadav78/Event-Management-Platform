<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - National Public School</title>
    <script src="/static/js/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.51/build/spline-viewer.js"></script>
    <style>
        /* 3D Entry Animation for Login Card */
        @keyframes float-up {
            0% { transform: translateY(30px) translateZ(-50px) rotateX(10deg); opacity: 0; }
            100% { transform: translateY(0) translateZ(0) rotateX(0); opacity: 1; }
        }
        .animate-float-up {
            animation: float-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            perspective: 1000px;
        }
        .spline-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
        spline-viewer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-sans text-slate-100">
    <!-- 3D Spline Interactive Scene -->
    <div class="spline-container pointer-events-auto">
        <spline-viewer url="https://prod.spline.design/6Wq1Q7YGyM-iab9i/scene.splinecode"></spline-viewer>
    </div>

    <!-- Login Container -->
    <div class="relative z-10 bg-slate-900/30 backdrop-blur-3xl rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-8 w-full max-w-sm border border-white/10 animate-float-up pointer-events-auto">
        <!-- Inner glow effect -->
        <div class="absolute inset-0 rounded-2xl pointer-events-none border border-white/5 bg-gradient-to-br from-white/10 to-transparent mix-blend-overlay"></div>
        
        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-[0_0_20px_rgba(79,70,229,0.4)] border border-white/20 transform rotate-3 hover:rotate-0 transition-transform duration-300">
                <svg class="w-8 h-8 text-white drop-shadow-md" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2l9 9-9 9-9-9 9-9z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight drop-shadow-md">National Public School</h1>
            <p class="text-sm text-blue-400/80 mt-1 font-medium">Events Manager</p>
        </div>
        
        {% if error %}
        <div class="bg-red-500/10 backdrop-blur-md border border-red-500/30 text-red-400 text-sm px-4 py-3 rounded-lg mb-6 shadow-[0_0_15px_rgba(239,68,68,0.15)] relative z-10">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login" class="space-y-5 relative z-10">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5 drop-shadow-sm">Email</label>
                <input type="email" name="email" required placeholder="admin@nps.com"
                    class="w-full bg-slate-950/50 backdrop-blur-md border border-white/10 text-white rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/20 placeholder-slate-500 shadow-inner transition-all duration-300 hover:border-white/20">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5 drop-shadow-sm">Password</label>
                <input type="password" name="password" required placeholder="••••••••"
                    class="w-full bg-slate-950/50 backdrop-blur-md border border-white/10 text-white rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/20 placeholder-slate-500 shadow-inner transition-all duration-300 hover:border-white/20">
            </div>
            <button type="submit"
                class="w-full mt-2 relative bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl text-sm font-semibold shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all duration-300 hover:shadow-[0_0_30px_rgba(79,70,229,0.5)] hover:-translate-y-0.5 active:translate-y-0.5 overflow-hidden border border-white/10 cursor-pointer group">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    Sign in
                    <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                </span>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-[150%] skew-x-[-20deg] transition-all duration-700 ease-in-out group-hover:translate-x-[150%]"></div>
            </button>
        </form>
    </div>
</body>
</html>
