<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}National Public School{% endblock %}</title>
    <script src="/static/js/tailwindcss.js"></script>
    <!-- 3D integration scripts -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.51/build/spline-viewer.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .sidebar-link { @apply flex items-center gap-3 px-4 py-2.5 text-sm text-slate-400 rounded-xl transition-all duration-300 cursor-pointer no-underline border border-transparent relative overflow-hidden; }
            .sidebar-link:hover { @apply text-white bg-white/5 border-white/10 shadow-[0_0_15px_rgba(59,130,246,0.15)] translate-x-1; }
            .sidebar-link.active { @apply text-white bg-blue-600/20 border-blue-500/30 shadow-[0_0_20px_rgba(59,130,246,0.2)]; }
            .sidebar-link svg { @apply opacity-70 shrink-0 transition-all duration-300; }
            .sidebar-link:hover svg, .sidebar-link.active svg { @apply opacity-100 drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]; }
            
            .stat-card { @apply bg-slate-900/40 backdrop-blur-xl rounded-2xl border border-white/10 shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] p-5 px-6 transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_12px_40px_0_rgba(59,130,246,0.15)] hover:border-white/20 relative overflow-hidden; }
            .stat-card::before { content: ''; @apply absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent pointer-events-none; }
            
            .card { @apply bg-slate-900/40 backdrop-blur-xl rounded-2xl border border-white/10 shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] p-5 transition-all duration-300 hover:border-white/20 relative overflow-hidden; }
            .card::before { content: ''; @apply absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent pointer-events-none; }

            .btn-primary { @apply relative bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-medium cursor-pointer border border-white/10 shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all duration-300 hover:shadow-[0_0_30px_rgba(79,70,229,0.5)] hover:-translate-y-0.5 active:translate-y-0.5 overflow-hidden inline-flex items-center justify-center; }
            .btn-primary::after { content: ''; @apply absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-[150%] skew-x-[-20deg] transition-all duration-700 ease-in-out pointer-events-none; }
            .btn-primary:hover::after { @apply translate-x-[150%]; }
            
            .btn-secondary { @apply bg-slate-800/50 backdrop-blur-md text-slate-200 px-5 py-2.5 rounded-xl text-sm font-medium cursor-pointer border border-white/10 shadow-lg transition-all duration-300 hover:bg-slate-700/50 hover:border-white/20 hover:-translate-y-0.5 hover:shadow-[0_8px_20px_rgba(0,0,0,0.3)] inline-flex items-center justify-center; }
            
            .badge-green { @apply bg-emerald-500/10 backdrop-blur-sm border border-emerald-500/20 text-emerald-400 text-[11px] px-2.5 py-1 rounded-full font-medium shadow-[0_0_10px_rgba(16,185,129,0.1)]; }
            .badge-amber { @apply bg-amber-500/10 backdrop-blur-sm border border-amber-500/20 text-amber-400 text-[11px] px-2.5 py-1 rounded-full font-medium shadow-[0_0_10px_rgba(245,158,11,0.1)]; }
            .badge-blue { @apply bg-blue-500/10 backdrop-blur-sm border border-blue-500/20 text-blue-400 text-[11px] px-2.5 py-1 rounded-full font-medium shadow-[0_0_10px_rgba(59,130,246,0.1)]; }
            .badge-gray { @apply bg-slate-500/10 backdrop-blur-sm border border-slate-500/20 text-slate-400 text-[11px] px-2.5 py-1 rounded-full font-medium; }
            
            .form-input { @apply w-full bg-slate-900/50 backdrop-blur-md border border-white/10 rounded-xl px-3 py-2 text-sm outline-none transition-all duration-300 text-white placeholder-slate-500 shadow-inner; }
            .form-input:focus { @apply border-blue-500/50 ring-4 ring-blue-500/20 bg-slate-800/60 shadow-[0_0_15px_rgba(59,130,246,0.15)]; }
            
            .form-label { @apply block text-[13px] font-medium text-slate-300 mb-1.5 drop-shadow-md; }
            
            .table-header { @apply text-left px-4 py-3 bg-slate-800/40 backdrop-blur-md text-[11px] font-semibold text-slate-400 uppercase tracking-wider border-b border-white/5; }
            .table-cell { @apply px-4 py-3.5 text-sm text-slate-200 border-b border-white/5 bg-transparent transition-colors hover:bg-white/5; }
            
            .filter-pill { @apply px-3 py-1.5 rounded-full text-xs cursor-pointer border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-medium transition-all duration-150; }
            .filter-pill.on { @apply bg-[#1a2535] dark:bg-blue-600 text-white border-[#1a2535] dark:border-blue-600; }
        }

        /* 3D Page Entrance Animation */
        @keyframes flip-in-3d {
            0% { transform: perspective(1200px) rotateX(15deg) translateY(40px) scale(0.95); opacity: 0; }
            100% { transform: perspective(1200px) rotateX(0deg) translateY(0) scale(1); opacity: 1; }
        }
        .animate-3d-flip {
            animation: flip-in-3d 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
    </style>
    <script>
        function init3DPhysics() {
            VanillaTilt.init(document.querySelectorAll(".card, .stat-card"), {
                max: 8,
                speed: 400,
                glare: true,
                "max-glare": 0.3,
                perspective: 1000
            });
        }
        // Run on initial page load
        document.addEventListener('DOMContentLoaded', init3DPhysics);
        // Run after HTMX dynamically swaps a new page
        document.addEventListener('htmx:afterSwap', function (e) {
            init3DPhysics();
            if (e.detail.target.id === 'main-content') {
                var path = new URL(e.detail.pathInfo.finalRequestPath || window.location.href, window.location.origin).pathname;
                document.querySelectorAll('.sidebar-link').forEach(link => {
                    if (link.getAttribute('href') === path) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });
            }
        });
    </script>
</head>

<body class="bg-slate-950 m-0 text-slate-100 relative overflow-hidden font-sans" hx-boost="true"
    hx-target="#main-content" hx-select="#main-content">

    <!-- 3D Spline Background (Preserved seamlessly across page clicks!) -->
    <div id="spline-dashboard-bg" hx-preserve="true" class="absolute inset-0 z-0 overflow-hidden pointer-events-auto">
        <spline-viewer url="https://prod.spline.design/6Wq1Q7YGyM-iab9i/scene.splinecode"
            style="width: 100%; height: 100%;"></spline-viewer>
    </div>

    <div class="relative z-10 flex h-screen overflow-hidden pointer-events-none">

        <!-- Sidebar -->
        <aside
            class="w-[220px] bg-slate-900/30 backdrop-blur-3xl border-r border-white/10 flex flex-col shrink-0 shadow-[4px_0_24px_-4px_rgba(0,0,0,0.5)] pointer-events-auto">
            <div class="px-5 py-6 pb-4 border-b border-white/10 relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-blue-500/10 to-transparent pointer-events-none">
                </div>
                <div
                    class="text-white text-base font-semibold relative z-10 drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">
                    School Events</div>
                <div class="text-blue-400/80 text-xs mt-0.5 relative z-10">Admin Panel</div>
            </div>

            <nav class="flex-1 px-3 py-4 flex flex-col gap-0.5">
                <div class="text-[10px] text-slate-500 uppercase tracking-widest px-2 py-2 pb-1.5 font-semibold">Main
                </div>

                <a href="/dashboard" class="sidebar-link {% if active == 'dashboard' %}active{% endif %}">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1.5" />
                        <rect x="14" y="3" width="7" height="7" rx="1.5" />
                        <rect x="3" y="14" width="7" height="7" rx="1.5" />
                        <rect x="14" y="14" width="7" height="7" rx="1.5" />
                    </svg>
                    Dashboard
                </a>
                <a href="/events" class="sidebar-link {% if active == 'events' %}active{% endif %}">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <path d="M16 2v4M8 2v4M3 10h18" />
                    </svg>
                    Events
                </a>
                <a href="/students" class="sidebar-link {% if active == 'students' %}active{% endif %}">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                    </svg>
                    Students
                </a>
                <a href="/houses" class="sidebar-link {% if active == 'houses' %}active{% endif %}">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path d="M12 2l9 9-9 9-9-9 9-9z" />
                    </svg>
                    Houses
                </a>
                <a href="/certificates" class="sidebar-link {% if active == 'certificates' %}active{% endif %}">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <path d="M7 8h10M7 12h10M7 16h6" />
                    </svg>
                    Certificates
                </a>
                <a href="/settings" class="sidebar-link {% if active == 'settings' %}active{% endif %}">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
                    </svg>
                    Settings
                </a>
            </nav>

            <!-- Admin avatar at bottom -->
            <div
                class="px-5 py-4 border-t border-white/10 flex items-center gap-2.5 bg-slate-900/20 hover:bg-slate-800/40 transition-colors">
                <div
                    class="w-[34px] h-[34px] rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center text-[13px] font-bold text-white shrink-0 shadow-[0_0_10px_rgba(59,130,246,0.5)] border border-white/20">
                    A</div>
                <div class="flex-1 min-w-0">
                    <div class="text-white text-[13px] font-medium">Admin</div>
                    <div class="text-blue-400/80 text-[11px]">Super admin</div>
                </div>
                <!-- Logout shouldn't be boosted by HTMX typically if it redirects, but HTMX handles redirects fine -->
                <a href="/logout" title="Logout" class="text-slate-400 hover:text-white transition-colors hx-disable">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1" />
                    </svg>
                </a>
            </div>
        </aside>

        <!-- Main -->
        <main id="main-content" class="flex-1 flex flex-col overflow-hidden relative pointer-events-auto">
            <header
                class="bg-slate-900/30 backdrop-blur-3xl border-b border-white/10 px-7 py-4 flex items-center justify-between shadow-[0_4px_24px_-4px_rgba(0,0,0,0.5)] z-20">
                <h1 class="text-lg font-semibold text-white m-0 drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">{% block
                    page_title %}Dashboard{% endblock %}</h1>
                <div class="flex items-center gap-3">
                    {% block header_actions %}{% endblock %}
                    <div
                        class="w-9 h-9 rounded-full bg-blue-600/20 border border-blue-500/30 flex items-center justify-center text-[13px] font-bold text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.2)] backdrop-blur-md">
                        AD</div>
                </div>
            </header>
            <!-- The animation class flips the entire content in 3D dynamically on every page load/swap -->
            <div class="flex-1 overflow-y-auto p-7 relative z-10 scrollbar-hide animate-3d-flip">
                <!-- Slight overlay for content readability -->
                <div class="absolute inset-0 bg-slate-950/20 pointer-events-none -z-10"></div>
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>

</html>
