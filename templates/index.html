<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - National Public School</title>
    <link href="/static/css/output.css" rel="stylesheet">
    <style>
        @keyframes fade-in-up {
            0% {
                transform: translateY(40px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-fade-in-up {
            animation: fade-in-up 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }
    </style>
</head>

<body class="bg-slate-950 m-0 overflow-hidden font-sans text-slate-100">

    <!-- Cinematic, cursor-reactive background -->
    <div class="cine-bg" aria-hidden="true">
        <div class="cine-parallax" id="cineParallax">
            <div class="cine-orb cine-orb-1"></div>
            <div class="cine-orb cine-orb-2"></div>
            <div class="cine-orb cine-orb-3"></div>
        </div>
        <div class="cine-spot" id="cineSpot"></div>
        <div class="cine-vignette"></div>
    </div>

    <!-- UI Overlay -->
    <div class="relative z-10 w-full h-screen flex flex-col items-center justify-center p-6 pointer-events-none">

        <!-- Hero Content -->
        <div
            class="max-w-3xl text-center flex flex-col items-center justify-center pointer-events-auto bg-slate-900/30 backdrop-blur-md p-10 rounded-3xl border border-white/10 shadow-[0_30px_60px_rgba(0,0,0,0.5)]">
            <div
                class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 backdrop-blur-md border border-white/10 mb-6 animate-fade-in-up">
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                <span class="text-xs font-semibold text-blue-300 tracking-wider uppercase">Interactive 3D
                    Experience</span>
            </div>

            <h1
                class="text-5xl md:text-6xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-white via-white to-white/40 mb-6 drop-shadow-[0_0_30px_rgba(255,255,255,0.2)] animate-fade-in-up delay-100">
                National Public School
            </h1>

            <p
                class="text-lg md:text-xl text-slate-300 mb-10 max-w-xl mx-auto drop-shadow-md animate-fade-in-up delay-300">
                The next-generation, hyper-immersive Event Management Platform
            </p>

            <a href="/login"
                class="group relative inline-flex items-center justify-center px-8 py-4 font-semibold text-white transition-all duration-300 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 shadow-[0_0_30px_rgba(79,70,229,0.4)] hover:shadow-[0_0_40px_rgba(79,70,229,0.6)] hover:-translate-y-1 overflow-hidden animate-fade-in-up delay-300 pointer-events-auto cursor-pointer no-underline border border-white/20">
                <span class="relative z-10 flex items-center gap-3">
                    Enter Platform
                    <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </span>
                <div
                    class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-[150%] skew-x-[-20deg] transition-all duration-700 ease-in-out group-hover:translate-x-[150%]">
                </div>
            </a>
        </div>

    </div>

    <!-- Copyright -->
    <div class="fixed bottom-2 left-1/2 -translate-x-1/2 z-20 text-[11px] text-slate-400/70 text-center pointer-events-none px-3">
        &copy; Made for National Public School, Kengeri &middot; Programmed &amp; designed by Shanah Devni &amp; Prince Yadav &middot; Batch 2025&ndash;26
    </div>

    <script>
        (function () {
            var spot = document.getElementById('cineSpot');
            var par = document.getElementById('cineParallax');
            var tx = 0, ty = 0, cx = 0, cy = 0;
            window.addEventListener('mousemove', function (e) {
                if (spot) {
                    spot.style.setProperty('--mx', e.clientX + 'px');
                    spot.style.setProperty('--my', e.clientY + 'px');
                }
                tx = (e.clientX / window.innerWidth - 0.5) * 40;
                ty = (e.clientY / window.innerHeight - 0.5) * 40;
            }, { passive: true });
            (function raf() {
                cx += (tx - cx) * 0.06;
                cy += (ty - cy) * 0.06;
                if (par) par.style.transform = 'translate(' + cx.toFixed(2) + 'px,' + cy.toFixed(2) + 'px)';
                requestAnimationFrame(raf);
            })();
        }());
    </script>

</body>

</html>
